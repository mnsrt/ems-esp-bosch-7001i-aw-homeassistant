- id: 'hp_high_delta_t_alert'
  alias: "⚠️ Heat Pump High Delta T (Low Flow Proxy)"
  description: "Alerts if Delta T > 10°C while compressor is active"
  trigger:
    - platform: numeric_state
      entity_id: sensor.heating_loop_delta_t
      above: 10
      for:
        minutes: 5
  condition:
    - condition: numeric_state
      entity_id: sensor.boiler_hpcurrpower
      above: 200 # Compressor is definitely running
  action:
    - service: notify.notify
      data:
        title: "⚠️ Heat Pump Flow Warning"
        message: >
          Delta T is currently {{ states('sensor.heating_loop_delta_t') }}°C. 
          Flow may be restricted. Check the magnetic filter and system pressure.
    - service: persistent_notification.create
      data:
        title: "Efficiency Alert"
        message: "High Delta T detected. The Bosch 13kW efficiency (COP) drops as Delta T rises above 7°C."
  mode: single