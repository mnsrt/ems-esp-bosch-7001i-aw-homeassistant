- id: '1772265861370'
  alias: 'WP MQTT: Set force_update on boiler_nrgtotal if missing'
  description: 'This automation adds ''force_update: true'' to the discovery message
    of ''boiler_nrgtotal'' when the flag is missing or false, preserving all other
    content.'
  triggers:
  - topic: homeassistant/sensor/ems-esp/boiler_nrgtotal/config
    trigger: mqtt
  conditions:
  - condition: template
    value_template: '{% set payload = trigger.payload | from_json %} {{ not payload.get(''force_update'',
      False) }}

      '
    enabled: true
    alias: Only if force_update flag is false or missing entirely
  actions:
  - data:
      topic: homeassistant/sensor/ems-esp/boiler_nrgtotal/config
      payload: '{% set payload = trigger.payload | from_json %}{{ dict(payload, force_update=true)
        | to_json }}

        '
      retain: false
    action: mqtt.publish
    enabled: true
  mode: single

- id: 'mqtt_fix_state_class_boiler_nrgsupptotal'
  alias: 'WP MQTT: Fix state_class on boiler_nrgsupptotal'
  description: 'Injects state_class: total_increasing + device_class: energy into
    the discovery payload so HA records sum statistics (required for "today" change cards).'
  triggers:
  - topic: homeassistant/sensor/ems-esp/boiler_nrgsupptotal/config
    trigger: mqtt
  conditions:
  - condition: template
    value_template: >
      {% set p = trigger.payload | from_json %}
      {{ p.get('state_class', '') != 'total_increasing' }}
  actions:
  - data:
      topic: homeassistant/sensor/ems-esp/boiler_nrgsupptotal/config
      payload: >
        {% set p = trigger.payload | from_json %}
        {{ dict(p, state_class='total_increasing', device_class='energy') | to_json }}
      retain: true
    action: mqtt.publish
  mode: single

